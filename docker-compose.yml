services:
  earnable-backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: earnable-backend
    restart: always
    ports:
      - "${EARNABLE_BACKEND_PORT:-3300}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_HOST: earnable-db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      REDIS_HOST: earnable-redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-15000}
      INGESTION_ENABLED: ${INGESTION_ENABLED:-false}
      FIRECRAWL_BASE_URL: ${FIRECRAWL_BASE_URL:-https://api.firecrawl.dev}
      FIRECRAWL_TIMEOUT_MS: ${FIRECRAWL_TIMEOUT_MS:-15000}
      INGESTION_MAX_CHARS: ${INGESTION_MAX_CHARS:-12000}
      THROTTLE_AUTH_TTL: ${THROTTLE_AUTH_TTL:-60}
      THROTTLE_AUTH_LIMIT: ${THROTTLE_AUTH_LIMIT:-5}
      THROTTLE_DEFAULT_TTL: ${THROTTLE_DEFAULT_TTL:-60}
      THROTTLE_DEFAULT_LIMIT: ${THROTTLE_DEFAULT_LIMIT:-100}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      earnable-db:
        condition: service_healthy
      earnable-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  earnable-db:
    image: postgres:15.17-trixie
    container_name: earnable-db
    restart: always
    ports:
      - "${EARNABLE_DB_PORT:-55433}:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  earnable-redis:
    image: redis:trixie
    container_name: earnable-redis
    restart: always
    ports:
      - "${EARNABLE_REDIS_PORT:-56379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    container_name: earnable-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
